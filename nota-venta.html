<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
    <title>Generador de Nota de Venta - Lecar</title>
    <style>
        :root {
            --ac: #5C6B5A; --acl: #E8EDE7; --acm: #4A5748; --acd: #2E3A2D;
            --gy: #f5f5f5; --gy2: #e0e0e0; --gy3: #9e9e9e; --gy4: #424242;
            --wh: #fff; --tx: #212121; --red: #C62828; --gn: #2E7D32;
            --rad: 12px; --rads: 8px; --sh: 0 2px 8px rgba(0,0,0,.10);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #ECEFF1; color: var(--tx); padding-bottom: 40px; }
        
        .hdr { background: var(--ac); padding: 15px; display: flex; align-items: center; gap: 15px; color: #fff; box-shadow: var(--sh); }
        .hdr img { height: 45px; background: #fff; border-radius: 6px; padding: 5px; }
        
        .wrap { max-width: 700px; margin: 0 auto; padding: 15px; }
        .card { background: var(--wh); border-radius: var(--rad); padding: 20px; margin-bottom: 15px; box-shadow: var(--sh); }
        .ctit { font-size: 13px; font-weight: 700; color: var(--ac); text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .ctit::before { content: ''; width: 4px; height: 16px; background: var(--ac); border-radius: 2px; }

        .fld { margin-bottom: 12px; }
        .fld label { font-size: 12px; color: var(--gy3); display: block; margin-bottom: 5px; font-weight: 700; }
        .fld input, .fld select, .fld textarea { 
            width: 100%; padding: 12px; border: 1.5px solid var(--gy2); border-radius: var(--rads); 
            font-size: 15px; font-family: inherit;
        }
        .fld input:focus { border-color: var(--ac); outline: none; }
        
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        /* Previsualizador de totales */
        .resumen-total {
            background: var(--acd); color: #fff; padding: 20px; border-radius: var(--rad); margin-top: 10px;
        }
        .resumen-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; opacity: 0.9; }
        .resumen-total-main { font-size: 24px; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; margin-top: 10px; display: flex; justify-content: space-between; }

        .btn-prim { width: 100%; padding: 15px; border: none; border-radius: var(--rads); font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-save { background: var(--ac); color: #fff; margin-top: 10px; }
        .btn-wsp { background: #25D366; color: #fff; }
        .btn-pdf { background: var(--red); color: #fff; }
        
        @media print { .no-print { display: none; } .wrap { width: 100%; max-width: none; } .card { box-shadow: none; border: 1px solid #eee; } }
    </style>
</head>
<body>

<div class="hdr no-print">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..." alt="Lecar"> <div>
        <h1 style="font-size: 18px;">Nota de Venta Definitiva</h1>
        <p style="font-size: 12px; opacity: 0.8;">Implementos Lecar S.R.L.</p>
    </div>
</div>

<div class="wrap">
    <div class="card no-print">
        <div class="ctit">Producto y Precio Base</div>
        <div class="fld">
            <label>Seleccionar Implemento</label>
            <select id="prod-select" onchange="updateProductData()">
                <option value="">-- Seleccionar --</option>
                </select>
        </div>
        <div class="grid2">
            <div class="fld">
                <label>Precio Base (USD/ARS)</label>
                <input type="number" id="p-base" oninput="calcTotal()">
            </div>
            <div class="fld">
                <label>IVA</label>
                <select id="p-iva" onchange="calcTotal()">
                    <option value="0">Sin IVA</option>
                    <option value="10.5">10.5%</option>
                    <option value="21">21%</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card no-print">
        <div class="ctit">Configuración Comercial</div>
        <div class="fld">
            <label>Descuento Aplicado (%)</label>
            <select id="p-desc" onchange="calcTotal()">
                <option value="0">Precio Lista</option>
                <option value="10">Contado (10%)</option>
                <option value="15">Concesionario (15%)</option>
                <option value="23.5">Conc + Contado (23.5%)</option>
            </select>
        </div>
        <div class="fld">
            <label>Opcionales / Recargos ($)</label>
            <input type="number" id="p-opc" value="0" oninput="calcTotal()">
        </div>
        <div class="grid2">
            <div class="fld">
                <label>Forma de Pago</label>
                <select id="p-formapago">
                    <option value="Contado">Contado</option>
                    <option value="Canje Cereal">Canje Cereal</option>
                    <option value="0-30-60-90 días">0-30-60-90 días</option>
                    <option value="Cheques fijos">Cheques fijos</option>
                </select>
            </div>
            <div class="fld">
                <label>Fecha de Entrega</label>
                <input type="text" id="p-entrega" placeholder="Ej: 20 días">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="ctit">Datos del Cliente y Facturación</div>
        <div class="fld">
            <label>Nombre o Razón Social</label>
            <input type="text" id="c-nombre">
        </div>
        <div class="grid2">
            <div class="fld"><label>CUIT</label><input type="text" id="c-cuit"></div>
            <div class="fld"><label>Teléfono</label><input type="text" id="c-tel"></div>
        </div>
        <div class="fld">
            <label>Dirección</label>
            <input type="text" id="c-dir">
        </div>
        <div class="fld">
            <label>Observaciones de la Venta</label>
            <textarea id="c-obs" rows="2"></textarea>
        </div>
    </div>

    <div class="resumen-total">
        <div class="resumen-line"><span>Subtotal:</span> <span id="res-sub">0.00</span></div>
        <div class="resumen-line"><span>Descuento:</span> <span id="res-desc">0.00</span></div>
        <div class="resumen-line"><span>IVA:</span> <span id="res-iva">0.00</span></div>
        <div class="resumen-total-main">
            <span>TOTAL:</span>
            <span id="res-total">$ 0.00</span>
        </div>
    </div>

    <div class="no-print" style="margin-top: 20px;">
        <button class="btn-prim btn-save" onclick="guardarEnSheets()">CONFIRMAR Y GUARDAR VENTA</button>
        <div class="grid2" style="margin-top: 10px;">
            <button class="btn-prim btn-wsp" onclick="enviarWSP()">WhatsApp</button>
            <button class="btn-prim btn-pdf" onclick="window.print()">Imprimir PDF</button>
        </div>
    </div>
</div>

<script>
    // BASE DE DATOS LOCAL (Similar a tu Cotizador)
    const DB = [
        { n: "Maicero Lecar", v: "14 a 52", p: 45000 },
        { n: "Maicero Lecar", v: "16 a 52", p: 52000 },
        { n: "Tolva Autodescargable", v: "14 TT", p: 28000 },
        { n: "Sinfín Cargador", v: "8 metros", p: 4500 },
        { n: "Personalizado", v: "-", p: 0 }
    ];

    function init() {
        const sel = document.getElementById('prod-select');
        DB.forEach((item, index) => {
            let opt = document.createElement('option');
            opt.value = index;
            opt.innerHTML = `${item.n} - ${item.v}`;
            sel.appendChild(opt);
        });
    }

    function updateProductData() {
        const index = document.getElementById('prod-select').value;
        if (index !== "") {
            document.getElementById('p-base').value = DB[index].p;
            calcTotal();
        }
    }

    function calcTotal() {
        let base = parseFloat(document.getElementById('p-base').value) || 0;
        let opc = parseFloat(document.getElementById('p-opc').value) || 0;
        let descPorc = parseFloat(document.getElementById('p-desc').value) || 0;
        let ivaPorc = parseFloat(document.getElementById('p-iva').value) || 0;

        let subtotal = base + opc;
        let descMonto = subtotal * (descPorc / 100);
        let conDesc = subtotal - descMonto;
        let ivaMonto = conDesc * (ivaPorc / 100);
        let total = conDesc + ivaMonto;

        document.getElementById('res-sub').innerText = subtotal.toLocaleString('es-AR', {minimumFractionDigits:2});
        document.getElementById('res-desc').innerText = "- " + descMonto.toLocaleString('es-AR', {minimumFractionDigits:2});
        document.getElementById('res-iva').innerText = ivaMonto.toLocaleString('es-AR', {minimumFractionDigits:2});
        document.getElementById('res-total').innerText = "$ " + total.toLocaleString('es-AR', {minimumFractionDigits:2});
    }

    async function guardarEnSheets() {
        // Lógica de SheetDB (POST)
        const payload = {
            data: [{
                Fecha: new Date().toLocaleDateString(),
                Cliente: document.getElementById('c-nombre').value,
                Producto: document.getElementById('prod-select').options[document.getElementById('prod-select').selectedIndex].text,
                Total: document.getElementById('res-total').innerText,
                Estado: "Confirmada"
            }]
        };
        
        try {
            const resp = await fetch("https://sheetdb.io/api/v1/t0edzlszadw98", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(resp.ok) alert("✅ Venta guardada correctamente en Sheets.");
        } catch(e) {
            alert("Error al conectar con Sheets.");
        }
    }

    function enviarWSP() {
        let texto = `*NOTA DE VENTA - LECAR*%0A` +
                    `Cliente: ${document.getElementById('c-nombre').value}%0A` +
                    `Total: ${document.getElementById('res-total').innerText}%0A` +
                    `Entrega: ${document.getElementById('p-entrega').value}`;
        window.open(`https://wa.me/?text=${texto}`);
    }

    init();
</script>

</body>
</html>

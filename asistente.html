<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Asistente Lecar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0F1E;
  --surface:#111827;
  --surface2:#1a2235;
  --border:#1e2d45;
  --blue:#3B82F6;
  --blue2:#1D4ED8;
  --cyan:#06B6D4;
  --green:#10B981;
  --red:#EF4444;
  --amber:#F59E0B;
  --text:#F1F5F9;
  --muted:#64748B;
  --card:#141c2e;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* GRID BACKGROUND */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:16px 12px 40px}

/* HEADER */
.hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(17,24,39,.8);border:1px solid var(--border);border-radius:16px;margin-bottom:16px;backdrop-filter:blur(12px)}
.hdr img{height:36px;background:#fff;border-radius:6px;padding:2px 5px}
.hdr-t h1{font-size:14px;font-weight:700;color:var(--text)}
.hdr-t p{font-size:11px;color:var(--muted);margin-top:1px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:auto;flex-shrink:0;box-shadow:0 0 8px var(--green)}
.status-dot.off{background:var(--muted);box-shadow:none}
.status-dot.listening{background:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--red)}50%{opacity:.5;box-shadow:0 0 20px var(--red)}}

/* CHAT */
.chat{min-height:320px;max-height:380px;overflow-y:auto;padding:8px 0;margin-bottom:12px;display:flex;flex-direction:column;gap:10px}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-track{background:transparent}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.msg{display:flex;gap:10px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.asst{flex-direction:row}
.msg.user{flex-direction:row-reverse}
.avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.avatar.a{background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff}
.avatar.u{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.bubble{max-width:82%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5}
.msg.asst .bubble{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:4px 14px 14px 14px}
.msg.user .bubble{background:var(--blue2);color:#fff;border-radius:14px 4px 14px 14px}
.bubble.thinking{color:var(--muted);font-style:italic}
.dots span{display:inline-block;animation:blink 1.2s infinite;margin-right:2px}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}

/* RESUMEN CARD */
.resumen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;display:none}
.resumen.show{display:block}
.res-title{font-size:11px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.res-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.res-row:last-child{border-bottom:none}
.res-row .rl{color:var(--muted)}
.res-row .rv{font-weight:500;font-family:'DM Mono',monospace;font-size:12px}
.res-row .rv.pos{color:var(--green)}
.res-row .rv.neg{color:var(--red)}
.res-row .rv.total{color:var(--cyan);font-size:15px;font-weight:700}
.res-total{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(6,182,212,.1));border:1px solid rgba(59,130,246,.3);border-radius:10px;padding:12px;margin-top:10px;display:flex;justify-content:space-between;align-items:center}
.res-total .tl{font-size:12px;color:var(--muted)}
.res-total .tv{font-size:22px;font-weight:700;color:var(--cyan);font-family:'DM Mono',monospace}
.res-total .tb{font-size:11px;color:var(--blue);background:rgba(59,130,246,.15);padding:2px 8px;border-radius:4px;margin-top:3px;display:inline-block}

/* MIC BUTTON */
.mic-area{display:flex;flex-direction:column;align-items:center;gap:12px;padding:16px 0}
.mic-btn{width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;transition:all .2s;position:relative;background:linear-gradient(135deg,var(--blue),var(--cyan))}
.mic-btn::before{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(59,130,246,.3);transition:all .2s}
.mic-btn:active{transform:scale(.94)}
.mic-btn.listening{background:linear-gradient(135deg,var(--red),#F97316);animation:micPulse 1.5s infinite}
.mic-btn.listening::before{border-color:rgba(239,68,68,.5);animation:ringPulse 1.5s infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 20px rgba(239,68,68,.4)}50%{box-shadow:0 0 40px rgba(239,68,68,.7)}}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.15);opacity:1}}
.mic-btn.disabled{background:var(--surface2);cursor:not-allowed;opacity:.5}
.mic-label{font-size:12px;color:var(--muted);text-align:center}

/* QUICK CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;justify-content:center}
.chip{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;background:var(--surface)}
.chip:active,.chip:hover{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,.08)}

/* ACTION BUTTONS */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.ab{padding:13px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'DM Sans',sans-serif}
.ab-wsp{background:#25D366;color:#fff}
.ab-new{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.ab-wsp:active{background:#1da851}
.ab-new:active{background:var(--border)}

/* INPUT FALLBACK */
.txt-input{display:flex;gap:8px;margin-bottom:8px}
.txt-input input{flex:1;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif}
.txt-input input:focus{outline:none;border-color:var(--blue)}
.txt-input button{padding:11px 16px;background:var(--blue);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;font-size:14px}

/* VENDEDOR SELECT */
.vsel{display:flex;gap:8px;margin-bottom:12px}
.vsel select{flex:1;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;appearance:auto}
.vsel select:focus{outline:none;border-color:var(--blue)}

@media(max-width:360px){.mic-btn{width:60px;height:60px;font-size:24px}}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <img id="logo" alt="Lecar">
    <div class="hdr-t">
      <h1>Asistente de Ventas</h1>
      <p>Lecar &middot; Lista N&deg;57</p>
    </div>
    <div class="status-dot off" id="sdot"></div>
  </div>

  <div id="key-setup" style="display:none;background:#1a2235;border:1px solid #1e2d45;border-radius:12px;padding:14px;margin-bottom:12px">
    <div style="font-size:11px;font-weight:700;color:#06B6D4;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Configuraci&#243;n API</div>
    <div style="font-size:12px;color:#64748B;margin-bottom:10px">Peg&#225; tu API key de Google AI Studio. Se guarda solo en este dispositivo.</div>
    <input type="password" id="key-input" placeholder="AIzaSy..." style="width:100%;padding:10px 12px;background:#0A0F1E;border:1px solid #1e2d45;border-radius:8px;color:#F1F5F9;font-size:13px;font-family:monospace;margin-bottom:8px">
    <button onclick="saveKey()" style="width:100%;padding:10px;background:#3B82F6;border:none;border-radius:8px;color:#fff;font-weight:700;font-size:13px;cursor:pointer">Guardar y continuar</button>
  </div>

  <div id="key-ok" style="display:none;background:#0d2818;border:1px solid #166534;border-radius:8px;padding:8px 12px;margin-bottom:10px;display:none;justify-content:space-between;align-items:center">
    <span style="font-size:12px;color:#4ade80">&#10003; API configurada</span>
    <button onclick="changeKey()" style="font-size:11px;color:#64748B;background:none;border:none;cursor:pointer;text-decoration:underline">Cambiar</button>
  </div>

  <div class="vsel">
    <select id="vendedor" onchange="onVendedor()">
      <option value="">&#128100; Seleccion&aacute; vendedor</option>
      <option value="Matias">Mat&iacute;as Gonz&aacute;lez</option>
      <option value="Lucas">Lucas Di Perna</option>
      <option value="Nicolas">Nicol&aacute;s Errasti</option>
    </select>
  </div>

  <div class="chat" id="chat"></div>

  <div class="resumen" id="resumen">
    <div class="res-title">&#9889; Resumen de cotizaci&oacute;n</div>
    <div id="res-rows"></div>
    <div class="res-total" id="res-total" style="display:none">
      <div><div class="tl">PRECIO FINAL</div><div class="tv" id="res-fin"></div><div class="tb" id="res-iva"></div></div>
    </div>
  </div>

  <div class="chips" id="chips" style="display:none"></div>

  <div class="mic-area">
    <button class="mic-btn disabled" id="micBtn" onclick="toggleMic()">&#127908;</button>
    <div class="mic-label" id="micLabel">Seleccion&aacute; vendedor para empezar</div>
  </div>

  <div class="txt-input">
    <input type="text" id="txtIn" placeholder="O escrib&iacute; ac&aacute;..." onkeydown="if(event.key==='Enter')sendText()">
    <button onclick="sendText()">&#8593;</button>
  </div>

  <div class="actions" id="actions" style="display:none">
    <button class="ab ab-wsp" onclick="enviarWSP()">&#128172; WhatsApp</button>
    <button class="ab ab-new" onclick="nuevaCot()">&#8635; Nueva</button>
  </div>

</div>

var SYSTEM_PROMPT=`Eres un asistente de ventas de Implementos Lecar SRL (Armstrong, Santa Fe, Argentina). 
Tu trabajo es guiar al vendedor paso a paso para armar una cotizacion completa.

BASE DE PRECIOS Y OPCIONALES:
${PRECIOS}

FLUJO QUE DEBES SEGUIR SIEMPRE:
1. Cuando el vendedor mencione un producto y cliente, confirma el producto con su precio base.
2. Pregunta por los opcionales especificos de ese producto (uno por uno o todos juntos).
3. Pregunta tipo de precio: lista, concesionario (-15%), contado (-10%) o ambos (cascada).
4. Pregunta si incluir IVA (10.5%) o no.
5. Pregunta forma de pago (0-30-60-90-120-150 dias con valores).
6. Pregunta si tiene observaciones o notas.
7. Cuando tengas todo, devuelve un JSON con este formato EXACTO (solo el JSON, sin texto antes ni despues):
{"ready":true,"cliente":"...","producto":"...","variante":"...","precioBase":0,"opcionales":[{"n":"nombre","p":0}],"tipo":"lista|conc|contado|cc","iva":false,"formaPago":"...","obs":"...","precioFinal":0,"ivaTag":"sin IVA"}

REGLAS:
- Respuestas MUY cortas, maximas 2 oraciones. El vendedor puede estar manejando.
- Usa lenguaje argentino informal y directo.
- Si el vendedor ya dio informacion en su primer mensaje, no la vuelvas a preguntar.
- Cuando devuelvas el JSON debe estar completo y correcto matematicamente.
- precioFinal debe estar calculado correctamente con descuentos e IVA.
- Para calcular: aplica opcionales al base, luego descuentos, luego IVA si corresponde.`;

var chatHistory=[];
var cotData=null;
var recognition=null;
var isListening=false;
var isPaused=false;
var vendedorActivo="";
var synth=window.speechSynthesis;

function fmt(v){return "$ "+Math.round(v).toLocaleString("es-AR");}

function getKey(){return localStorage.getItem("lecar_api_key")||"";}

function saveKey(){
  var k=document.getElementById("key-input").value.trim();
  if(!k.startsWith("AIza")){alert("Key inv\u00e1lida. Debe empezar con AIza...");return;}
  localStorage.setItem("lecar_api_key",k);
  document.getElementById("key-setup").style.display="none";
  document.getElementById("key-ok").style.display="flex";
}

function changeKey(){
  document.getElementById("key-ok").style.display="none";
  document.getElementById("key-setup").style.display="block";
  document.getElementById("key-input").value=getKey();
}

function checkKey(){
  var k=getKey();
  if(k){
    document.getElementById("key-ok").style.display="flex";
    document.getElementById("key-setup").style.display="none";
  } else {
    document.getElementById("key-setup").style.display="block";
    document.getElementById("key-ok").style.display="none";
  }
}

function onVendedor(){
  vendedorActivo=document.getElementById("vendedor").value;
  if(vendedorActivo){
    document.getElementById("micBtn").classList.remove("disabled");
    document.getElementById("micLabel").textContent="Tap para hablar";
    document.getElementById("sdot").classList.remove("off");
    if(chatHistory.length===0){
      addMsg("asst","Hola "+VND[vendedorActivo].n.split(" ")[0]+"! \uD83D\uDC4B Dec\u00edme qu\u00e9 quer\u00e9s cotizar.");
    }
  } else {
    document.getElementById("micBtn").classList.add("disabled");
    document.getElementById("micLabel").textContent="Seleccion\u00e1 vendedor para empezar";
    document.getElementById("sdot").classList.add("off");
  }
}

function addMsg(role,text){
  var chat=document.getElementById("chat");
  var div=document.createElement("div");
  div.className="msg "+( role==="asst"?"asst":"user");
  var av=document.createElement("div");
  av.className="avatar "+(role==="asst"?"a":"u");
  av.textContent=role==="asst"?"L":"V";
  var bub=document.createElement("div");
  bub.className="bubble";
  bub.textContent=text;
  div.appendChild(av);
  div.appendChild(bub);
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return bub;
}

function addThinking(){
  var chat=document.getElementById("chat");
  var div=document.createElement("div");
  div.className="msg asst";
  div.id="thinking-msg";
  var av=document.createElement("div");
  av.className="avatar a";
  av.textContent="L";
  var bub=document.createElement("div");
  bub.className="bubble thinking";
  bub.innerHTML='<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
  div.appendChild(av);
  div.appendChild(bub);
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function removeThinking(){
  var el=document.getElementById("thinking-msg");
  if(el) el.remove();
}

function speak(text){
  if(!synth) return;
  synth.cancel();
  var clean=text.replace(/\$[\d.,]+/g,function(m){return m.replace(/\./g," punto ").replace(/,/g," coma ");});
  var utt=new SpeechSynthesisUtterance(clean);
  utt.lang="es-AR";
  utt.rate=1.05;
  utt.pitch=1;
  var voices=synth.getVoices();
  var esp=voices.find(function(v){return v.lang.startsWith("es");});
  if(esp) utt.voice=esp;
  synth.speak(utt);
}

async function sendToAI(userMsg){
  if(!getKey()){
    addMsg("asst","Priméro configurá tu API key arriba.");
    resumeMic();
    return;
  }
  chatHistory.push({role:"user",content:userMsg});
  addThinking();

  try{
    var resp=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+getKey(),{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        system_instruction:{parts:[{text:SYSTEM_PROMPT}]},
        contents:chatHistory.map(function(m){
          return {role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]};
        })
      })
    });
    var data=await resp.json();
    removeThinking();
    var text=data.candidates&&data.candidates[0]?data.candidates[0].content.parts[0].text:"Error al conectar.";
    chatHistory.push({role:"assistant",content:text});

    // Check if JSON response
    var jsonMatch=text.match(/\{[\s\S]*"ready"\s*:\s*true[\s\S]*\}/);
    if(jsonMatch){
      try{
        cotData=JSON.parse(jsonMatch[0]);
        addMsg("asst","\u2705 Cotizaci\u00f3n lista. Revis\u00e1 el resumen abajo.");
        mostrarResumen();
        speak("Listo. Ten\u00e9s el resumen abajo. \u00bFLo mando por WhatsApp?");
        showChips([]);
        document.getElementById("actions").style.display="grid";
        stopMic();
        return;
      }catch(e){}
    }

    addMsg("asst",text);
    speak(text);
    resumeMic();

    // Show smart chips based on response
    var chips=[];
    if(text.toLowerCase().includes("opcional")||text.toLowerCase().includes("accesor")){
      chips=["S\u00ed","No","Sin opcionales"];
    } else if(text.toLowerCase().includes("precio")||text.toLowerCase().includes("descuento")){
      chips=["Lista","Concesionario","Contado","Conc + Contado"];
    } else if(text.toLowerCase().includes("iva")){
      chips=["Con IVA","Sin IVA"];
    } else if(text.toLowerCase().includes("pago")){
      chips=["Contado","30 d\u00edas","60 d\u00edas","0-30-60-90"];
    }
    showChips(chips);

  }catch(e){
    removeThinking();
    addMsg("asst","Error de conexi\u00f3n. Verific\u00e1 internet.");
    resumeMic();
  }
}

function showChips(arr){
  var c=document.getElementById("chips");
  if(!arr.length){c.style.display="none";return;}
  c.style.display="flex";
  c.innerHTML=arr.map(function(t){
    return '<button class="chip" onclick="chipClick(\''+t+'\')">'+t+'</button>';
  }).join("");
}

function chipClick(t){
  addMsg("user",t);
  sendToAI(t);
  showChips([]);
}

function sendText(){
  var inp=document.getElementById("txtIn");
  var t=inp.value.trim();
  if(!t) return;
  if(!vendedorActivo){alert("Seleccion\u00e1 vendedor primero.");return;}
  addMsg("user",t);
  inp.value="";
  sendToAI(t);
}

function toggleMic(){
  if(document.getElementById("micBtn").classList.contains("disabled")) return;
  if(isListening){stopMic();}else{startMic();}
}

function startMic(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("Tu navegador no soporta reconocimiento de voz. Us\u00e1 el campo de texto.");return;}
  if(recognition){try{recognition.abort();}catch(e){}}
  recognition=new SR();
  recognition.lang="es-AR";
  recognition.interimResults=false;
  recognition.continuous=true;
  recognition.maxAlternatives=1;

  recognition.onstart=function(){
    isListening=true;
    document.getElementById("micBtn").classList.add("listening");
    document.getElementById("micLabel").textContent="Escuchando... habl\u00e1 ahora";
  };

  recognition.onresult=function(e){
    // Get the latest result only
    var idx=e.results.length-1;
    if(e.results[idx].isFinal){
      var t=e.results[idx][0].transcript.trim();
      if(!t) return;
      addMsg("user",t);
      // Pause mic while AI responds
      pauseMic();
      sendToAI(t);
    }
  };

  recognition.onerror=function(e){
    if(e.error==="not-allowed"){
      stopMic();
      alert("Permiti\u00f3 el micr\u00f3fono en el navegador.");
    } else if(e.error==="no-speech"){
      // Ignore no-speech errors, keep listening
    } else {
      stopMic();
    }
  };

  recognition.onend=function(){
    // Auto-restart if still supposed to be listening
    if(isListening && !isPaused){
      try{recognition.start();}catch(e){}
    }
  };

  isPaused=false;
  recognition.start();
  synth.cancel();
}

function pauseMic(){
  // Temporarily stop listening while AI responds
  isPaused=true;
  if(recognition){try{recognition.stop();}catch(e){}}
  document.getElementById("micBtn").classList.remove("listening");
  document.getElementById("micLabel").textContent="Procesando...";
}

function resumeMic(){
  // Resume after AI responds
  if(!isListening) return;
  isPaused=false;
  try{recognition.start();}catch(e){}
  document.getElementById("micBtn").classList.add("listening");
  document.getElementById("micLabel").textContent="Escuchando... habl\u00e1 ahora";
}

function stopMic(){
  isListening=false;
  isPaused=false;
  if(recognition){try{recognition.abort();}catch(e){}}
  document.getElementById("micBtn").classList.remove("listening");
  document.getElementById("micLabel").textContent="Tap para hablar";
}

function mostrarResumen(){
  if(!cotData) return;
  var c=cotData;
  var rows=[];
  rows.push({l:"Producto",v:c.producto+" \u2014 "+c.variante,cls:""});
  rows.push({l:"Cliente",v:c.cliente,cls:""});
  rows.push({l:"Precio base",v:fmt(c.precioBase),cls:""});

  var subtotal=c.precioBase;
  if(c.opcionales&&c.opcionales.length){
    c.opcionales.forEach(function(o){
      subtotal+=o.p;
      rows.push({l:o.n,v:(o.p<0?"- ":"+ ")+fmt(Math.abs(o.p)),cls:o.p<0?"neg":"pos"});
    });
    if(c.opcionales.length) rows.push({l:"Subtotal",v:fmt(subtotal),cls:""});
  }

  var desc=0;
  if(c.tipo==="conc") desc=subtotal*.15;
  else if(c.tipo==="contado") desc=subtotal*.10;
  else if(c.tipo==="cc"){var d1=subtotal*.15;var d2=(subtotal-d1)*.10;desc=d1+d2;}
  if(desc>0){
    var descLabel=c.tipo==="conc"?"Desc. concesionario (15%)":c.tipo==="contado"?"Desc. contado (10%)":"Desc. conc + contado";
    rows.push({l:descLabel,v:"- "+fmt(desc),cls:"neg"});
  }

  var neto=subtotal-desc;
  var ivaVal=0;
  if(c.iva){ivaVal=neto*.105;rows.push({l:"IVA (+10.5%)",v:"+ "+fmt(ivaVal),cls:"pos"});}
  var fin=neto+ivaVal;

  if(c.formaPago) rows.push({l:"Forma de pago",v:c.formaPago,cls:""});
  if(c.obs) rows.push({l:"Observaciones",v:c.obs,cls:""});

  var res=document.getElementById("resumen");
  var rr=document.getElementById("res-rows");
  res.classList.add("show");
  rr.innerHTML=rows.map(function(r){
    return '<div class="res-row"><span class="rl">'+r.l+'</span><span class="rv '+r.cls+'">'+r.v+'</span></div>';
  }).join("");

  document.getElementById("res-fin").textContent=fmt(fin);
  document.getElementById("res-iva").textContent=c.iva?"c/ IVA 10.5%":"sin IVA";
  document.getElementById("res-total").style.display="flex";

  cotData.precioFinal=fin;
  cotData.ivaVal=ivaVal;
  cotData.subtotal=subtotal;
  cotData.desc=desc;
}

function buildTexto(){
  if(!cotData) return "";
  var v=VND[vendedorActivo];
  var vn=v?v.n:"Vendedor";
  var vt=v?v.t:"03471-490341";
  var t="*COTIZACI\u00d3N LECAR*\n";
  t+="Fecha: "+new Date().toLocaleDateString("es-AR")+"\n";
  t+="Vendedor: "+vn+"\n";
  t+="Cliente: "+cotData.cliente+"\n\n";
  t+="Producto: "+cotData.producto+" \u2014 "+cotData.variante+"\n";
  t+="Precio base: "+fmt(cotData.precioBase)+"\n";
  if(cotData.opcionales&&cotData.opcionales.length){
    cotData.opcionales.forEach(function(o){
      t+=o.n+": "+(o.p<0?"- ":"+ ")+fmt(Math.abs(o.p))+"\n";
    });
    t+="Subtotal: "+fmt(cotData.subtotal)+"\n";
  }
  if(cotData.desc>0) t+="Descuento: - "+fmt(cotData.desc)+"\n";
  if(cotData.iva) t+="IVA (+10.5%): + "+fmt(cotData.ivaVal)+"\n";
  t+="\n*PRECIO FINAL: "+fmt(cotData.precioFinal)+" ("+cotData.ivaTag+")*\n";
  if(cotData.formaPago) t+="Forma de pago: "+cotData.formaPago+"\n";
  if(cotData.obs) t+="Obs: "+cotData.obs+"\n";
  t+="\nImplementos Lecar S.R.L. \u00b7 Armstrong, Santa Fe \u00b7 "+vt;
  return t;
}

function enviarWSP(){
  var t=buildTexto();
  window.open("https://wa.me/?text="+encodeURIComponent(t),"_blank");
}

function nuevaCot(){
  cotData=null;
  chatHistory=[];
  document.getElementById("chat").innerHTML="";
  document.getElementById("resumen").classList.remove("show");
  document.getElementById("res-total").style.display="none";
  document.getElementById("actions").style.display="none";
  showChips([]);
  if(vendedorActivo){
    addMsg("asst","Listo para una nueva cotizaci\u00f3n. \u00bfQu\u00e9 producto?");
  }
}

// Init voices
if(synth) synth.getVoices();
checkKey();
